<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1200" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="g" cx="0.5" cy="0.35" r="0.85">
      <stop offset="0" stop-color="#0f3a23"/>
      <stop offset="0.55" stop-color="#0a1f15"/>
      <stop offset="1" stop-color="#050b08"/>
    </radialGradient>
    <radialGradient id="glow" cx="0.5" cy="0.35" r="0.45">
      <stop offset="0" stop-color="#22c55e" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#22c55e" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="1200" fill="url(#g)"/>
  <rect width="1600" height="1200" fill="url(#glow)"/>

  <!-- Decorative subtle grid -->
  <g opacity="0.06" stroke="#bbf7d0" stroke-width="1" fill="none">
    <path d="M0 200 H1600 M0 400 H1600 M0 600 H1600 M0 800 H1600 M0 1000 H1600"/>
    <path d="M200 0 V1200 M400 0 V1200 M600 0 V1200 M800 0 V1200 M1000 0 V1200 M1200 0 V1200 M1400 0 V1200"/>
  </g>

  <!-- Drifting food motifs at very low opacity -->
  <g opacity="0.15">
    <!-- fork (top-left) -->
    <g transform="translate(140,180) rotate(-18)" fill="#86efac">
      <rect x="-4" y="0" width="8" height="160" rx="3"/>
      <rect x="-16" y="-20" width="4" height="36" rx="1"/>
      <rect x="-6" y="-20" width="4" height="36" rx="1"/>
      <rect x="4" y="-20" width="4" height="36" rx="1"/>
      <rect x="14" y="-20" width="4" height="36" rx="1"/>
      <rect x="-16" y="-24" width="32" height="6" rx="2"/>
    </g>
    <!-- knife (right side) -->
    <g transform="translate(1440,260) rotate(14)" fill="#86efac">
      <rect x="-3" y="0" width="6" height="160" rx="2"/>
      <path d="M-12 -40 q12 -2 24 0 L6 4 L-6 4 Z"/>
    </g>
    <!-- spoon (bottom-left) -->
    <g transform="translate(180,900) rotate(28)" fill="#86efac">
      <rect x="-3" y="0" width="6" height="160" rx="2"/>
      <ellipse cx="0" cy="-12" rx="16" ry="24"/>
    </g>
    <!-- plate (bottom-right) -->
    <g transform="translate(1380,940)" fill="none" stroke="#86efac" stroke-width="2">
      <circle cx="0" cy="0" r="80"/>
      <circle cx="0" cy="0" r="62"/>
    </g>
    <!-- leaves accent (centre) -->
    <g transform="translate(800,1020)" fill="#22c55e">
      <ellipse cx="0" cy="0" rx="34" ry="14" transform="rotate(20)"/>
      <ellipse cx="34" cy="-8" rx="28" ry="12" transform="rotate(-15)"/>
    </g>
  </g>

  <!-- Soft floating particles -->
  <g fill="#22c55e" opacity="0.18">
    <circle cx="320" cy="240" r="4"/>
    <circle cx="500" cy="380" r="3"/>
    <circle cx="280" cy="540" r="3"/>
    <circle cx="1180" cy="180" r="4"/>
    <circle cx="1340" cy="520" r="3"/>
    <circle cx="640" cy="900" r="4"/>
    <circle cx="1080" cy="980" r="3"/>
    <circle cx="240" cy="780" r="3"/>
  </g>

  <!-- Top + bottom edge soft fade -->
  <linearGradient id="topfade" x1="0" x2="0" y1="0" y2="1">
    <stop offset="0" stop-color="#000000" stop-opacity="0.35"/>
    <stop offset="1" stop-color="#000000" stop-opacity="0"/>
  </linearGradient>
  <rect width="1600" height="200" fill="url(#topfade)"/>
</svg>
