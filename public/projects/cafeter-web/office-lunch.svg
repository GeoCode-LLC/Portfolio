      <g transform="translate(12,234)">
        <rect width="272" height="100" rx="10" fill="#ffffff" stroke="#e5e7eb"/>
        <rect x="10" y="10" width="44" height="44" rx="8" fill="#fee2e2"/>
        <rect x="22" y="14" width="20" height="36" rx="3" fill="#dc2626"/>
