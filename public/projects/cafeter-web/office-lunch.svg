  <text x="60" y="396" font-size="60" font-weight="800" fill="#16a34a">Seamless</text>
  <text x="60" y="468" font-size="60" font-weight="800" fill="#16a34a">delivery.</text>

  <text x="60" y="524" font-size="18" fill="#6b7280">Connect kitchens, companies, and</text>
