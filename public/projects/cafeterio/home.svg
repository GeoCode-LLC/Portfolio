<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" font-family="-apple-system, system-ui, sans-serif">
  <rect width="390" height="844" fill="#faf8f4"/>

  <!-- Status bar -->
  <g transform="translate(22,22)">
    <rect width="46" height="22" rx="11" fill="#22c55e"/>
    <text x="23" y="16" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">5:37</text>
  </g>
  <g transform="translate(298,28)" fill="#000">
    <rect x="0" y="6" width="3" height="4" rx="0.6"/>
    <rect x="5" y="4" width="3" height="6" rx="0.6"/>
    <rect x="10" y="2" width="3" height="8" rx="0.6"/>
    <rect x="15" y="0" width="3" height="10" rx="0.6"/>
    <text x="29" y="10" font-size="10" font-weight="700" fill="#000">5G</text>
    <path d="M40 6 q4 -5 10 -5 q6 0 10 5" fill="none" stroke="#000" stroke-width="1.6" stroke-linecap="round"/>
    <path d="M43 8 q3 -3 7 -3 q4 0 7 3" fill="none" stroke="#000" stroke-width="1.6" stroke-linecap="round"/>
    <circle cx="50" cy="10" r="1.2"/>
    <rect x="66" y="2" width="26" height="10" rx="2.5" fill="none" stroke="#000" stroke-width="1"/>
    <rect x="93" y="5" width="1.8" height="4" rx="0.5"/>
    <rect x="68" y="4" width="22" height="6" rx="1.5" fill="#000"/>
  </g>

  <!-- Brand header -->
  <g transform="translate(24,76)">
    <rect width="28" height="28" rx="7" fill="#22c55e"/>
    <path d="M22 14 a8 8 0 1 0 -8 8" fill="none" stroke="#ffffff" stroke-width="2.6" stroke-linecap="round"/>
    <path d="M14 11 v6 M11 11 v2 M17 11 v2 M14 17 v3" stroke="#ffffff" stroke-width="1.6" stroke-linecap="round"/>
  </g>
  <text x="60" y="92" font-size="18" font-weight="800" fill="#0f172a">Gourmet Kitchen</text>
  <text x="60" y="112" font-size="12" fill="#9ca3af">4 items</text>

  <!-- Search icon -->
  <g transform="translate(24,134)" fill="none" stroke="#16a34a" stroke-width="2" stroke-linecap="round">
    <circle cx="8" cy="8" r="6"/>
    <line x1="13" y1="13" x2="18" y2="18"/>
  </g>

  <!-- Filter pills -->
  <g transform="translate(58,124)">
    <rect width="58" height="36" rx="18" fill="#22c55e"/>
    <text x="29" y="23" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">All</text>

    <rect x="68" width="120" height="36" rx="18" fill="#ffffff" stroke="#e5e7eb"/>
    <text x="128" y="23" font-size="13" font-weight="600" fill="#0f172a" text-anchor="middle">Main Dishes</text>

    <rect x="198" width="78" height="36" rx="18" fill="#ffffff" stroke="#e5e7eb"/>
    <text x="237" y="23" font-size="13" font-weight="600" fill="#0f172a" text-anchor="middle">Salads</text>
  </g>

  <!-- Row 1: Caesar Salad + Greek Salad -->
  <g transform="translate(16,184)">
    <rect width="172" height="232" rx="16" fill="#ffffff" stroke="#eceae5"/>
    <!-- image -->
    <g transform="translate(10,10)">
      <clipPath id="ch1"><rect width="152" height="128" rx="12"/></clipPath>
      <g clip-path="url(#ch1)">
        <rect width="152" height="128" fill="#fef3c7"/>
        <!-- plate -->
        <rect x="22" y="14" width="108" height="100" rx="12" fill="#fff7e6"/>
        <!-- chicken pieces -->
        <ellipse cx="50" cy="60" rx="22" ry="16" fill="#b45309"/>
        <ellipse cx="50" cy="58" rx="22" ry="14" fill="#d97706"/>
        <path d="M32 50 q18 -10 36 0 q-6 10 -18 12 q-12 -2 -18 -12 z" fill="#92400e" opacity="0.5"/>
        <ellipse cx="92" cy="68" rx="22" ry="16" fill="#b45309"/>
        <ellipse cx="92" cy="66" rx="22" ry="14" fill="#d97706"/>
        <path d="M74 58 q18 -10 36 0 q-6 10 -18 12 q-12 -2 -18 -12 z" fill="#92400e" opacity="0.5"/>
        <!-- lemon wedges -->
        <path d="M30 86 q8 -2 16 4 q-4 8 -16 -4 z" fill="#fde047"/>
        <path d="M30 86 q8 -2 16 4" stroke="#facc15" stroke-width="1" fill="none"/>
        <!-- greens -->
        <ellipse cx="116" cy="90" rx="14" ry="8" fill="#16a34a"/>
        <ellipse cx="116" cy="88" rx="14" ry="6" fill="#22c55e"/>
      </g>
    </g>

    <text x="14" y="160" font-size="16" font-weight="800" fill="#0f172a">Caesar Salad</text>
    <text x="14" y="180" font-size="10" font-weight="600" fill="#9ca3af" letter-spacing="0.5">ROMAINE, PARMESAN,</text>
    <text x="14" y="194" font-size="10" font-weight="600" fill="#9ca3af" letter-spacing="0.5">CROUTONS, DRESSING</text>

    <text x="14" y="222" font-size="17" font-weight="800" fill="#0f172a">6.00 ₾</text>
    <circle cx="148" cy="216" r="14" fill="#22c55e"/>
    <text x="148" y="222" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">+</text>
  </g>

  <g transform="translate(202,184)">
    <rect width="172" height="232" rx="16" fill="#ffffff" stroke="#eceae5"/>
    <g transform="translate(10,10)">
      <clipPath id="ch2"><rect width="152" height="128" rx="12"/></clipPath>
      <g clip-path="url(#ch2)">
        <rect width="152" height="128" fill="#dcfce7"/>
        <!-- bowl -->
        <ellipse cx="76" cy="78" rx="62" ry="20" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.2"/>
        <ellipse cx="76" cy="74" rx="62" ry="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.2"/>
        <!-- salad mix -->
        <circle cx="38" cy="64" r="9" fill="#22c55e"/>
        <circle cx="54" cy="60" r="10" fill="#16a34a"/>
        <circle cx="72" cy="64" r="9" fill="#ef4444"/>
        <circle cx="88" cy="60" r="10" fill="#dc2626"/>
        <circle cx="106" cy="64" r="9" fill="#22c55e"/>
        <rect x="46" y="52" width="9" height="9" rx="1.5" fill="#fafafa" stroke="#94a3b8" stroke-width="0.8"/>
        <rect x="80" y="54" width="9" height="9" rx="1.5" fill="#fafafa" stroke="#94a3b8" stroke-width="0.8"/>
        <rect x="98" y="52" width="9" height="9" rx="1.5" fill="#fafafa" stroke="#94a3b8" stroke-width="0.8"/>
        <circle cx="64" cy="70" r="3" fill="#1e293b"/>
        <circle cx="96" cy="70" r="3" fill="#1e293b"/>
        <ellipse cx="50" cy="78" rx="5" ry="3" fill="#16a34a" opacity="0.7"/>
      </g>
    </g>

    <text x="14" y="160" font-size="16" font-weight="800" fill="#0f172a">ბერძნული სალათი</text>
    <text x="14" y="180" font-size="10" font-weight="600" fill="#9ca3af" letter-spacing="0.5">TOMATO, CUCUMBER,</text>
    <text x="14" y="194" font-size="10" font-weight="600" fill="#9ca3af" letter-spacing="0.5">FETA, OLIVES</text>

    <text x="14" y="222" font-size="17" font-weight="800" fill="#0f172a">9.00 ₾</text>
    <circle cx="148" cy="216" r="14" fill="#22c55e"/>
    <text x="148" y="222" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">+</text>
  </g>

  <!-- Row 2: Grilled Chicken + Salmon -->
  <g transform="translate(16,428)">
    <rect width="172" height="232" rx="16" fill="#ffffff" stroke="#eceae5"/>
    <g transform="translate(10,10)">
      <clipPath id="ch3"><rect width="152" height="128" rx="12"/></clipPath>
      <g clip-path="url(#ch3)">
        <rect width="152" height="128" fill="#1f2937"/>
        <!-- griddle plate -->
        <ellipse cx="76" cy="68" rx="58" ry="42" fill="#0f172a"/>
        <ellipse cx="76" cy="68" rx="58" ry="42" fill="none" stroke="#334155" stroke-width="1.5"/>
        <!-- grilled chicken breast -->
        <path d="M36 60 q12 -22 40 -22 q28 0 40 22 q-12 16 -40 16 q-28 0 -40 -16 z" fill="#a16207"/>
        <path d="M36 60 q12 -22 40 -22 q28 0 40 22 q-12 16 -40 16 q-28 0 -40 -16 z" fill="none" stroke="#713f12" stroke-width="1"/>
        <!-- grill marks -->
        <path d="M44 50 q14 -10 32 0" stroke="#451a03" stroke-width="2" fill="none" opacity="0.7"/>
        <path d="M44 62 q14 -8 32 0" stroke="#451a03" stroke-width="2" fill="none" opacity="0.7"/>
        <path d="M76 36 v36 M64 38 v32 M88 38 v32" stroke="#451a03" stroke-width="1.4" fill="none" opacity="0.8"/>
        <!-- herbs / rosemary sprigs -->
        <path d="M40 84 q8 -6 16 -2 M44 88 v-4 M48 90 v-5 M52 89 v-5" stroke="#16a34a" stroke-width="1.4" fill="none" stroke-linecap="round"/>
        <path d="M96 86 q8 -4 16 0 M100 90 v-4 M106 91 v-5 M112 89 v-4" stroke="#16a34a" stroke-width="1.4" fill="none" stroke-linecap="round"/>
      </g>
    </g>

    <text x="14" y="160" font-size="16" font-weight="800" fill="#0f172a">Grilled Chicken Breast</text>
    <text x="14" y="180" font-size="10" font-weight="600" fill="#9ca3af" letter-spacing="0.5">CHICKEN, HERBS, OLIVE</text>
    <text x="14" y="194" font-size="10" font-weight="600" fill="#9ca3af" letter-spacing="0.5">OIL</text>

    <text x="14" y="222" font-size="17" font-weight="800" fill="#0f172a">12.50 ₾</text>
    <circle cx="148" cy="216" r="14" fill="#22c55e"/>
    <text x="148" y="222" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">+</text>
  </g>

  <g transform="translate(202,428)">
    <rect width="172" height="232" rx="16" fill="#ffffff" stroke="#eceae5"/>
    <g transform="translate(10,10)">
      <clipPath id="ch4"><rect width="152" height="128" rx="12"/></clipPath>
      <g clip-path="url(#ch4)">
        <rect width="152" height="128" fill="#fef3c7"/>
        <!-- plate with salmon -->
        <ellipse cx="76" cy="68" rx="58" ry="40" fill="#ffffff"/>
        <ellipse cx="76" cy="68" rx="58" ry="40" fill="none" stroke="#e5e7eb" stroke-width="1.2"/>
        <!-- salmon fillet -->
        <path d="M40 72 q10 -22 36 -22 q26 0 36 22 q-10 14 -36 14 q-26 0 -36 -14 z" fill="#fb923c"/>
        <path d="M40 72 q10 -22 36 -22 q26 0 36 22 q-10 14 -36 14 q-26 0 -36 -14 z" fill="none" stroke="#ea580c" stroke-width="0.9"/>
        <path d="M48 68 q14 -8 28 -8 q14 0 28 8" stroke="#fed7aa" stroke-width="1.6" fill="none" opacity="0.7"/>
        <path d="M48 76 q14 -6 28 -6 q14 0 28 6" stroke="#fed7aa" stroke-width="1.6" fill="none" opacity="0.7"/>
        <!-- lemon -->
        <path d="M104 82 q10 -2 14 6 q-8 6 -14 -6 z" fill="#fde047"/>
        <!-- herbs -->
        <path d="M40 56 q6 -8 14 -6" stroke="#16a34a" stroke-width="1.6" fill="none"/>
        <path d="M52 50 q4 -8 10 -4" stroke="#16a34a" stroke-width="1.6" fill="none"/>
      </g>
    </g>

    <text x="14" y="160" font-size="16" font-weight="800" fill="#0f172a">Salmon Fillet</text>
    <text x="14" y="180" font-size="10" font-weight="600" fill="#9ca3af" letter-spacing="0.5">SALMON, LEMON, DILL,</text>
    <text x="14" y="194" font-size="10" font-weight="600" fill="#9ca3af" letter-spacing="0.5">OLIVE OIL</text>

    <text x="14" y="222" font-size="17" font-weight="800" fill="#0f172a">15.00 ₾</text>
    <circle cx="148" cy="216" r="14" fill="#22c55e"/>
    <text x="148" y="222" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">+</text>
  </g>

  <!-- Floating cart pill -->
  <g transform="translate(20,680)">
    <rect width="350" height="56" rx="28" fill="#16a34a"/>
    <circle cx="32" cy="28" r="16" fill="#ffffff"/>
    <text x="32" y="33" font-size="13" font-weight="800" fill="#16a34a" text-anchor="middle">1</text>
    <text x="68" y="34" font-size="15" font-weight="700" fill="#ffffff">Total  6.00 ₾</text>
    <rect x="230" y="10" width="110" height="36" rx="18" fill="#ffffff"/>
    <text x="285" y="34" font-size="14" font-weight="700" fill="#16a34a" text-anchor="middle">View Cart  →</text>
  </g>

  <!-- Bottom tab bar -->
  <rect x="0" y="755" width="390" height="89" fill="#faf8f4"/>
  <line x1="0" y1="755" x2="390" y2="755" stroke="#e5e7eb"/>

  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Menu (utensils crossed, active) -->
    <g transform="translate(48,776)" stroke="#16a34a" stroke-width="2.4">
      <path d="M2 2 L20 20 M20 2 L2 20"/>
      <path d="M6 2 v6 a3 3 0 0 0 3 3 h2 v9"/>
    </g>
    <circle cx="60" cy="810" r="3" fill="#16a34a"/>

    <!-- Cart (bag) -->
    <g transform="translate(140,776)" stroke="#9ca3af" stroke-width="2.2">
      <path d="M3 8 H21 V22 a2 2 0 0 1 -2 2 H5 a2 2 0 0 1 -2 -2 Z"/>
      <path d="M8 8 V5 a4 4 0 0 1 8 0 V8"/>
    </g>

    <!-- Receipt -->
    <g transform="translate(230,776)" stroke="#9ca3af" stroke-width="2.2">
      <path d="M4 2 H20 V22 L17 20 L14 22 L11 20 L8 22 L4 20 Z"/>
      <path d="M8 8 H16 M8 12 H16 M8 16 H13"/>
    </g>

    <!-- Profile -->
    <g transform="translate(316,776)" stroke="#9ca3af" stroke-width="2.2">
      <circle cx="14" cy="9" r="5"/>
      <path d="M3 24 a11 11 0 0 1 22 0"/>
    </g>
  </g>
</svg>
