<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" font-family="-apple-system, system-ui, sans-serif">
  <rect width="390" height="844" fill="#faf8f4"/>

  <!-- Status bar -->
  <text x="32" y="38" font-size="15" font-weight="700" fill="#000">2:03</text>
  <g transform="translate(298,28)" fill="#000">
    <rect x="0" y="6" width="3" height="4" rx="0.6"/>
    <rect x="5" y="4" width="3" height="6" rx="0.6"/>
    <rect x="10" y="2" width="3" height="8" rx="0.6"/>
    <rect x="15" y="0" width="3" height="10" rx="0.6"/>
    <path d="M24 6 q4 -5 10 -5 q6 0 10 5" fill="none" stroke="#000" stroke-width="1.6" stroke-linecap="round"/>
    <path d="M27 8 q3 -3 7 -3 q4 0 7 3" fill="none" stroke="#000" stroke-width="1.6" stroke-linecap="round"/>
    <circle cx="34" cy="10" r="1.2"/>
    <rect x="50" y="2" width="26" height="10" rx="2.5" fill="none" stroke="#000" stroke-width="1"/>
    <rect x="77" y="5" width="1.8" height="4" rx="0.5"/>
    <rect x="52" y="4" width="22" height="6" rx="1.5" fill="#000"/>
    <text x="63" y="9" font-size="6" font-weight="700" fill="#fff" text-anchor="middle">63</text>
  </g>

  <!-- Title row -->
  <text x="24" y="100" font-size="34" font-weight="800" fill="#0f172a">Cart</text>
  <text x="24" y="128" font-size="14" fill="#9ca3af">1 item</text>

  <line x1="0" y1="148" x2="390" y2="148" stroke="#eceae5"/>

  <!-- Review row -->
  <text x="24" y="184" font-size="14" fill="#6b7280">Review your items</text>
  <g transform="translate(258,162)">
    <rect width="108" height="34" rx="17" fill="#fee2e2"/>
    <g transform="translate(16,9)" stroke="#dc2626" stroke-width="1.7" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M2 3 H16"/>
      <path d="M3 3 V14 a1.5 1.5 0 0 0 1.5 1.5 h8 a1.5 1.5 0 0 0 1.5 -1.5 V3"/>
      <path d="M6 3 V1.5 h6 V3"/>
    </g>
    <text x="74" y="22" font-size="13" font-weight="700" fill="#dc2626" text-anchor="middle">Clear All</text>
  </g>

  <!-- Item card -->
  <g transform="translate(16,216)">
    <rect width="358" height="148" rx="14" fill="#ffffff" stroke="#eceae5"/>
    <!-- thumbnail -->
    <g transform="translate(16,16)">
      <clipPath id="th"><rect width="68" height="68" rx="10"/></clipPath>
      <g clip-path="url(#th)">
        <rect width="68" height="68" fill="#1f2937"/>
        <ellipse cx="34" cy="34" rx="28" ry="22" fill="#0f172a"/>
        <ellipse cx="34" cy="34" rx="28" ry="22" fill="none" stroke="#334155" stroke-width="1"/>
        <!-- sausages -->
        <g transform="rotate(-25 34 34)">
          <rect x="10" y="22" width="48" height="10" rx="5" fill="#9a3412"/>
          <rect x="10" y="22" width="48" height="10" rx="5" fill="none" stroke="#7c2d12" stroke-width="0.6"/>
          <rect x="10" y="34" width="48" height="10" rx="5" fill="#b45309"/>
          <rect x="10" y="34" width="48" height="10" rx="5" fill="none" stroke="#7c2d12" stroke-width="0.6"/>
          <rect x="10" y="46" width="48" height="10" rx="5" fill="#9a3412"/>
          <rect x="10" y="46" width="48" height="10" rx="5" fill="none" stroke="#7c2d12" stroke-width="0.6"/>
        </g>
      </g>
    </g>

    <text x="100" y="42" font-size="17" font-weight="800" fill="#0f172a">Sausage</text>
    <text x="100" y="66" font-size="15" font-weight="700" fill="#0f172a">13.00 ₾</text>

    <!-- Stepper -->
    <g transform="translate(16,98)">
      <rect width="100" height="34" rx="10" fill="#ffffff" stroke="#e5e7eb"/>
      <text x="18" y="23" font-size="18" font-weight="600" fill="#0f172a" text-anchor="middle">−</text>
      <text x="50" y="23" font-size="14" font-weight="700" fill="#0f172a" text-anchor="middle">1</text>
      <text x="82" y="23" font-size="18" font-weight="600" fill="#0f172a" text-anchor="middle">+</text>
    </g>

    <line x1="128" y1="116" x2="282" y2="116" stroke="#eceae5"/>
    <text x="136" y="121" font-size="13" fill="#9ca3af">Subtotal:</text>
    <text x="342" y="121" font-size="15" font-weight="800" fill="#0f172a" text-anchor="end">13.00 ₾</text>

    <!-- close X -->
    <g transform="translate(316,12)">
      <circle cx="14" cy="14" r="14" fill="#f3f4f6"/>
      <path d="M9 9 l10 10 M19 9 l-10 10" stroke="#6b7280" stroke-width="1.8" stroke-linecap="round"/>
    </g>
  </g>

  <!-- Total + card charge -->
  <g transform="translate(16,556)">
    <text x="8" y="22" font-size="16" fill="#6b7280">Total</text>
    <text x="56" y="22" font-size="20" font-weight="800" fill="#0f172a">13.00 ₾</text>

    <rect x="178" y="6" width="156" height="26" rx="13" fill="#fee2e2"/>
    <text x="256" y="23" font-size="11" font-weight="700" fill="#dc2626" text-anchor="middle">Card charge: 13.00 ₾</text>

    <path d="M344 16 l8 8 l8 -8" stroke="#0f172a" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Apple Pay row -->
  <g transform="translate(16,600)">
    <rect width="358" height="60" rx="14" fill="#ffffff" stroke="#eceae5"/>
    <rect x="14" y="14" width="48" height="32" rx="6" fill="#ffffff" stroke="#0f172a" stroke-width="1.5"/>
    <g transform="translate(20,21)" fill="#000">
      <path d="M5.8 2.1 c-0.4 0.4 -0.9 0.7 -1.5 0.7 c-0.1 -0.6 0.1 -1.1 0.5 -1.5 c0.4 -0.4 1 -0.7 1.5 -0.7 c0.1 0.6 -0.1 1.1 -0.5 1.5z"/>
      <path d="M6.3 3 c-0.8 0 -1.5 0.5 -1.9 0.5 c-0.4 0 -1 -0.5 -1.7 -0.5 c-0.9 0 -1.7 0.5 -2.1 1.3 c-0.9 1.5 -0.2 3.8 0.7 5 c0.4 0.6 0.9 1.3 1.6 1.3 c0.6 0 0.9 -0.4 1.6 -0.4 c0.8 0 1 0.4 1.7 0.4 c0.7 0 1.1 -0.6 1.5 -1.2 c0.5 -0.7 0.7 -1.4 0.7 -1.4 c-0.1 0 -1.3 -0.5 -1.4 -2 c0 -1.3 1 -1.8 1.1 -1.9 c-0.6 -0.9 -1.5 -1 -1.8 -1z"/>
    </g>
    <text x="40" y="33" font-size="9" font-weight="700" fill="#000" text-anchor="middle">Pay</text>
    <text x="78" y="32" font-size="15" font-weight="800" fill="#0f172a">Apple Pay</text>
    <text x="78" y="48" font-size="11" fill="#9ca3af">Will be charged 13.00 ₾</text>
    <path d="M342 26 l6 4 l-6 4" stroke="#0f172a" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Pay button -->
  <g transform="translate(16,672)">
    <rect width="358" height="56" rx="12" fill="#0f172a"/>
    <!-- Apple logo glyph -->
    <g transform="translate(154,18)" fill="#ffffff">
      <path d="M11.6 4.2 c-0.7 0.8 -1.8 1.4 -2.9 1.3 c-0.2 -1.1 0.3 -2.2 1 -2.9 c0.7 -0.8 1.9 -1.4 2.9 -1.4 c0.1 1.1 -0.3 2.3 -1 3z"/>
      <path d="M12.6 5.7 c-1.6 -0.1 -3 0.9 -3.7 0.9 c-0.8 0 -2 -0.9 -3.3 -0.9 c-1.7 0 -3.3 1 -4.1 2.5 c-1.7 3 -0.4 7.5 1.3 9.9 c0.8 1.2 1.8 2.5 3.1 2.5 c1.2 -0.1 1.7 -0.8 3.2 -0.8 c1.5 0 1.9 0.8 3.3 0.8 c1.4 0 2.2 -1.2 3 -2.4 c0.9 -1.3 1.3 -2.7 1.3 -2.7 c-0.1 0 -2.6 -1 -2.7 -3.9 c0 -2.5 2 -3.6 2.1 -3.7 c-1.2 -1.7 -3 -1.9 -3.6 -2z"/>
    </g>
    <text x="185" y="36" font-size="20" font-weight="600" fill="#ffffff">Pay</text>
  </g>

  <!-- Bottom tab bar -->
  <rect x="0" y="755" width="390" height="89" fill="#faf8f4"/>
  <line x1="0" y1="755" x2="390" y2="755" stroke="#eceae5"/>

  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Menu (utensils crossed) -->
    <g transform="translate(48,776)" stroke="#9ca3af" stroke-width="2.2">
      <path d="M2 2 L20 20 M20 2 L2 20"/>
      <path d="M6 2 v6 a3 3 0 0 0 3 3 h2 v9"/>
    </g>

    <!-- Cart (active, green circle bg with bag and badge) -->
    <g transform="translate(130,768)">
      <circle cx="30" cy="22" r="26" fill="#dcfce7"/>
      <g transform="translate(17,8)" stroke="#16a34a" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 8 H21 V22 a2 2 0 0 1 -2 2 H5 a2 2 0 0 1 -2 -2 Z" fill="#16a34a"/>
        <path d="M8 8 V5 a4 4 0 0 1 8 0 V8" stroke="#16a34a"/>
      </g>
      <!-- badge -->
      <circle cx="44" cy="6" r="9" fill="#16a34a"/>
      <text x="44" y="10" font-size="10" font-weight="800" fill="#ffffff" text-anchor="middle">1</text>
      <!-- active dot -->
      <circle cx="30" cy="50" r="3" fill="#16a34a"/>
    </g>

    <!-- Receipt -->
    <g transform="translate(230,776)" stroke="#9ca3af" stroke-width="2.2">
      <path d="M4 2 H20 V22 L17 20 L14 22 L11 20 L8 22 L4 20 Z"/>
      <path d="M8 8 H16 M8 12 H16 M8 16 H13"/>
    </g>

    <!-- Profile -->
    <g transform="translate(316,776)" stroke="#9ca3af" stroke-width="2.2">
      <circle cx="14" cy="9" r="5"/>
      <path d="M3 24 a11 11 0 0 1 22 0"/>
    </g>
  </g>
</svg>
