<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="table" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#fde68a"/>
      <stop offset="1" stop-color="#fbbf24"/>
    </linearGradient>
    <radialGradient id="plate" cx="0.5" cy="0.45" r="0.55">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f5f0e6"/>
    </radialGradient>
    <linearGradient id="greens" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#22c55e"/>
      <stop offset="1" stop-color="#15803d"/>
    </linearGradient>
    <linearGradient id="chicken" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#d97706"/>
      <stop offset="1" stop-color="#92400e"/>
    </linearGradient>
  </defs>

  <!-- Wooden table background -->
  <rect width="1600" height="1000" fill="url(#table)"/>
  <g opacity="0.25" stroke="#a16207" stroke-width="1.5" fill="none">
    <path d="M0 120 Q400 100 800 130 T1600 110"/>
    <path d="M0 260 Q500 240 900 280 T1600 250"/>
    <path d="M0 420 Q600 400 1100 440 T1600 410"/>
    <path d="M0 580 Q500 560 900 600 T1600 570"/>
    <path d="M0 740 Q600 720 1100 760 T1600 730"/>
    <path d="M0 880 Q500 860 900 900 T1600 870"/>
  </g>

  <!-- Soft warm glow -->
  <radialGradient id="glow" cx="0.5" cy="0.4" r="0.7">
    <stop offset="0" stop-color="#fef3c7" stop-opacity="0.55"/>
    <stop offset="1" stop-color="#fef3c7" stop-opacity="0"/>
  </radialGradient>
  <rect width="1600" height="1000" fill="url(#glow)"/>

  <!-- Big centre plate -->
  <g transform="translate(800,500)">
    <ellipse cx="0" cy="0" rx="380" ry="340" fill="url(#plate)"/>
    <ellipse cx="0" cy="0" rx="380" ry="340" fill="none" stroke="#f1e9d4" stroke-width="4"/>
    <ellipse cx="0" cy="0" rx="330" ry="296" fill="none" stroke="#f1e9d4" stroke-width="2"/>

    <!-- Grilled chicken pieces -->
    <g transform="translate(-200,-100)">
      <ellipse cx="0" cy="0" rx="110" ry="80" fill="url(#chicken)"/>
      <path d="M-90 -40 q60 -40 180 0 q-30 30 -90 38 q-60 -8 -90 -38 z" fill="#92400e" opacity="0.45"/>
      <path d="M-60 -10 q60 -30 120 0" stroke="#451a03" stroke-width="6" fill="none" opacity="0.6"/>
      <path d="M-60 20 q60 -30 120 0" stroke="#451a03" stroke-width="6" fill="none" opacity="0.6"/>
    </g>
    <g transform="translate(60,-150)">
      <ellipse cx="0" cy="0" rx="100" ry="70" fill="url(#chicken)"/>
      <path d="M-80 -30 q56 -30 160 0 q-30 26 -80 32 q-56 -6 -80 -32 z" fill="#92400e" opacity="0.45"/>
      <path d="M-50 0 q50 -24 100 0" stroke="#451a03" stroke-width="5" fill="none" opacity="0.6"/>
    </g>
    <g transform="translate(-40,80)">
      <ellipse cx="0" cy="0" rx="120" ry="80" fill="#b45309"/>
      <ellipse cx="0" cy="-4" rx="120" ry="76" fill="#d97706"/>
      <path d="M-80 -10 q60 -30 160 0" stroke="#451a03" stroke-width="6" fill="none" opacity="0.55"/>
    </g>

    <!-- Lemon wedges -->
    <g transform="translate(220,80)">
      <path d="M-50 0 q24 -36 64 16 q-24 24 -64 -16 z" fill="#fde047" stroke="#facc15" stroke-width="3"/>
      <path d="M-32 4 q20 -10 44 16" stroke="#facc15" stroke-width="2" fill="none"/>
    </g>
    <g transform="translate(-220,180)">
      <path d="M-40 0 q20 -28 56 14 q-20 22 -56 -14 z" fill="#fde047" stroke="#facc15" stroke-width="3"/>
    </g>

    <!-- Herb garnish -->
    <g transform="translate(180,180)">
      <ellipse cx="0" cy="0" rx="40" ry="18" fill="url(#greens)"/>
      <path d="M-30 0 q30 -16 60 0" stroke="#15803d" stroke-width="3" fill="none"/>
    </g>
    <circle cx="-90" cy="-180" r="14" fill="#16a34a"/>
    <circle cx="140" cy="-220" r="10" fill="#16a34a"/>
    <circle cx="240" cy="-40" r="12" fill="#16a34a"/>
  </g>

  <!-- Side small bowl with salad (top left) -->
  <g transform="translate(220,260)">
    <ellipse cx="0" cy="6" rx="160" ry="54" fill="#e5e7eb"/>
    <ellipse cx="0" cy="0" rx="160" ry="50" fill="#ffffff" stroke="#e5e7eb" stroke-width="3"/>
    <ellipse cx="0" cy="-4" rx="150" ry="44" fill="#fafafa"/>
    <circle cx="-90" cy="-10" r="22" fill="#22c55e"/>
    <circle cx="-50" cy="-18" r="24" fill="#16a34a"/>
    <circle cx="-10" cy="-10" r="22" fill="#ef4444"/>
    <circle cx="34" cy="-18" r="24" fill="#dc2626"/>
    <circle cx="78" cy="-10" r="22" fill="#22c55e"/>
    <rect x="-30" y="-30" width="20" height="20" rx="2.4" fill="#fafafa" stroke="#94a3b8" stroke-width="1.6"/>
    <rect x="22" y="-26" width="20" height="20" rx="2.4" fill="#fafafa" stroke="#94a3b8" stroke-width="1.6"/>
    <circle cx="-30" cy="6" r="6" fill="#1e293b"/>
    <circle cx="54" cy="6" r="6" fill="#1e293b"/>
  </g>

  <!-- Drink glass (right) -->
  <g transform="translate(1340,360)">
    <path d="M-60 -120 H60 L48 100 a14 14 0 0 1 -14 14 H-34 a14 14 0 0 1 -14 -14 Z" fill="#fed7aa" opacity="0.85"/>
    <path d="M-60 -120 H60 L48 100 a14 14 0 0 1 -14 14 H-34 a14 14 0 0 1 -14 -14 Z" fill="none" stroke="#fb923c" stroke-width="4"/>
    <!-- ice cubes -->
    <rect x="-40" y="-80" width="34" height="34" rx="6" fill="#ffffff" opacity="0.75"/>
    <rect x="6" y="-50" width="28" height="28" rx="5" fill="#ffffff" opacity="0.75"/>
    <rect x="-30" y="0" width="30" height="30" rx="5" fill="#ffffff" opacity="0.7"/>
    <!-- straw -->
    <rect x="14" y="-180" width="10" height="100" rx="4" transform="rotate(8 19 -130)" fill="#dc2626"/>
    <!-- lemon slice on rim -->
    <path d="M40 -130 a20 20 0 0 1 40 0 z" fill="#fde047" stroke="#facc15" stroke-width="3"/>
  </g>

  <!-- Cutlery (bottom left) -->
  <g transform="translate(160,860) rotate(-12)" fill="#9ca3af" stroke="#6b7280" stroke-width="2">
    <rect x="0" y="0" width="14" height="180" rx="6"/>
    <path d="M-2 -10 v40 M5 -16 v46 M12 -16 v46 M19 -10 v40" stroke="#9ca3af" stroke-width="6" fill="none" stroke-linecap="round" transform="translate(-4,0)"/>
  </g>
  <g transform="translate(1440,860) rotate(12)" fill="#9ca3af" stroke="#6b7280" stroke-width="2">
    <rect x="0" y="0" width="14" height="180" rx="6"/>
    <ellipse cx="7" cy="-12" rx="18" ry="28" fill="#9ca3af"/>
  </g>

  <!-- Subtle herb sprinkles -->
  <g fill="#16a34a" opacity="0.7">
    <circle cx="420" cy="180" r="6"/>
    <circle cx="500" cy="140" r="5"/>
    <circle cx="1100" cy="160" r="6"/>
    <circle cx="1180" cy="220" r="5"/>
    <circle cx="900" cy="900" r="6"/>
    <circle cx="700" cy="920" r="5"/>
    <circle cx="320" cy="780" r="5"/>
  </g>
</svg>
