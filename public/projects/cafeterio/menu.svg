<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" font-family="-apple-system, system-ui, sans-serif">
  <rect width="390" height="844" fill="#faf8f4"/>

  <!-- Status bar -->
  <g transform="translate(22,22)">
    <rect width="46" height="22" rx="11" fill="#22c55e"/>
    <text x="23" y="16" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">5:37</text>
  </g>
  <g transform="translate(298,28)" fill="#000">
    <rect x="0" y="6" width="3" height="4" rx="0.6"/>
    <rect x="5" y="4" width="3" height="6" rx="0.6"/>
    <rect x="10" y="2" width="3" height="8" rx="0.6"/>
    <rect x="15" y="0" width="3" height="10" rx="0.6"/>
    <text x="29" y="10" font-size="10" font-weight="700" fill="#000">5G</text>
    <path d="M40 6 q4 -5 10 -5 q6 0 10 5" fill="none" stroke="#000" stroke-width="1.6" stroke-linecap="round"/>
    <path d="M43 8 q3 -3 7 -3 q4 0 7 3" fill="none" stroke="#000" stroke-width="1.6" stroke-linecap="round"/>
    <circle cx="50" cy="10" r="1.2"/>
    <rect x="66" y="2" width="26" height="10" rx="2.5" fill="none" stroke="#000" stroke-width="1"/>
    <rect x="93" y="5" width="1.8" height="4" rx="0.5"/>
    <rect x="68" y="4" width="22" height="6" rx="1.5" fill="#000"/>
  </g>

  <!-- Brand header (dimmed) -->
  <g opacity="0.45">
    <g transform="translate(24,76)">
      <rect width="28" height="28" rx="7" fill="#22c55e"/>
      <path d="M22 14 a8 8 0 1 0 -8 8" fill="none" stroke="#ffffff" stroke-width="2.6" stroke-linecap="round"/>
      <path d="M14 11 v6 M11 11 v2 M17 11 v2 M14 17 v3" stroke="#ffffff" stroke-width="1.6" stroke-linecap="round"/>
    </g>
    <text x="60" y="92" font-size="18" font-weight="800" fill="#0f172a">Gourmet Kitchen</text>
    <text x="60" y="112" font-size="12" fill="#9ca3af">4 items</text>

    <g transform="translate(24,134)" fill="none" stroke="#16a34a" stroke-width="2" stroke-linecap="round">
      <circle cx="8" cy="8" r="6"/>
      <line x1="13" y1="13" x2="18" y2="18"/>
    </g>

    <g transform="translate(58,124)">
      <rect width="58" height="36" rx="18" fill="#22c55e"/>
      <text x="29" y="23" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">All</text>
      <rect x="68" width="120" height="36" rx="18" fill="#ffffff" stroke="#e5e7eb"/>
      <text x="128" y="23" font-size="13" font-weight="600" fill="#0f172a" text-anchor="middle">Main Dishes</text>
      <rect x="198" width="78" height="36" rx="18" fill="#ffffff" stroke="#e5e7eb"/>
      <text x="237" y="23" font-size="13" font-weight="600" fill="#0f172a" text-anchor="middle">Salads</text>
    </g>
  </g>

  <!-- Dim overlay -->
  <rect x="0" y="0" width="390" height="844" fill="#0f172a" opacity="0.18"/>

  <!-- Modal sheet -->
  <g transform="translate(16,180)">
    <rect width="358" height="540" rx="24" fill="#ffffff"/>

    <!-- Hero image -->
    <clipPath id="hero"><rect width="358" height="280" rx="24"/></clipPath>
    <g clip-path="url(#hero)">
      <rect width="358" height="280" fill="#fef3c7"/>
      <!-- plate -->
      <ellipse cx="179" cy="160" rx="160" ry="110" fill="#fff7e6"/>
      <ellipse cx="179" cy="160" rx="160" ry="110" fill="none" stroke="#fde68a" stroke-width="2"/>
      <!-- chicken pieces grilled -->
      <g transform="translate(60,100)">
        <ellipse cx="40" cy="40" rx="36" ry="26" fill="#b45309"/>
        <ellipse cx="40" cy="38" rx="36" ry="24" fill="#d97706"/>
        <path d="M10 28 q30 -16 60 0 q-10 16 -30 18 q-20 -2 -30 -18 z" fill="#92400e" opacity="0.45"/>
        <path d="M22 40 q18 -10 36 0" stroke="#451a03" stroke-width="2" fill="none" opacity="0.6"/>
      </g>
      <g transform="translate(160,80)">
        <ellipse cx="40" cy="40" rx="38" ry="28" fill="#b45309"/>
        <ellipse cx="40" cy="38" rx="38" ry="26" fill="#d97706"/>
        <path d="M8 28 q32 -18 64 0 q-12 18 -32 20 q-20 -2 -32 -20 z" fill="#92400e" opacity="0.45"/>
        <path d="M22 42 q18 -10 36 0" stroke="#451a03" stroke-width="2" fill="none" opacity="0.6"/>
      </g>
      <g transform="translate(90,168)">
        <ellipse cx="40" cy="36" rx="40" ry="26" fill="#a16207"/>
        <ellipse cx="40" cy="34" rx="40" ry="24" fill="#ca8a04"/>
        <path d="M22 36 q18 -10 36 0" stroke="#451a03" stroke-width="2" fill="none" opacity="0.6"/>
      </g>
      <!-- lemon wedges -->
      <path d="M40 200 q22 -6 36 12 q-12 12 -36 -12 z" fill="#fde047" stroke="#facc15" stroke-width="1.4"/>
      <path d="M48 204 q14 -2 24 8" stroke="#facc15" stroke-width="1" fill="none"/>
      <path d="M300 220 q-22 -6 -36 12 q12 12 36 -12 z" fill="#fde047" stroke="#facc15" stroke-width="1.4"/>
      <!-- herbs garnish -->
      <ellipse cx="80" cy="80" rx="14" ry="6" fill="#16a34a"/>
      <ellipse cx="280" cy="90" rx="14" ry="6" fill="#16a34a"/>
      <circle cx="160" cy="240" r="5" fill="#16a34a"/>
      <circle cx="200" cy="244" r="5" fill="#16a34a"/>
    </g>

    <!-- Close button on image -->
    <circle cx="324" cy="24" r="18" fill="#ffffff"/>
    <path d="M318 18 l12 12 M330 18 l-12 12" stroke="#0f172a" stroke-width="2.4" stroke-linecap="round"/>

    <!-- Title -->
    <text x="24" y="324" font-size="24" font-weight="800" fill="#0f172a">Caesar Salad</text>
    <text x="24" y="350" font-size="14" fill="#6b7280">Classic Caesar with parmesan</text>

    <text x="24" y="392" font-size="11" font-weight="700" fill="#9ca3af" letter-spacing="1">INGREDIENTS</text>
    <text x="24" y="416" font-size="14" fill="#0f172a">Romaine, parmesan, croutons,</text>
    <text x="24" y="436" font-size="14" fill="#0f172a">dressing</text>

    <text x="24" y="484" font-size="26" font-weight="800" fill="#0f172a">6.00 ₾</text>

    <!-- Add to Cart button -->
    <rect x="24" y="500" width="310" height="56" rx="14" fill="#16a34a"/>
    <text x="179" y="535" font-size="16" font-weight="800" fill="#ffffff" text-anchor="middle">Add to Cart</text>
  </g>

  <!-- Bottom tab bar (faded) -->
  <rect x="0" y="755" width="390" height="89" fill="#faf8f4"/>
  <line x1="0" y1="755" x2="390" y2="755" stroke="#eceae5"/>

  <g fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.85">
    <g transform="translate(48,776)" stroke="#16a34a" stroke-width="2.4">
      <path d="M2 2 L20 20 M20 2 L2 20"/>
      <path d="M6 2 v6 a3 3 0 0 0 3 3 h2 v9"/>
    </g>
    <circle cx="60" cy="810" r="3" fill="#16a34a"/>

    <g transform="translate(140,776)" stroke="#9ca3af" stroke-width="2.2">
      <path d="M3 8 H21 V22 a2 2 0 0 1 -2 2 H5 a2 2 0 0 1 -2 -2 Z"/>
      <path d="M8 8 V5 a4 4 0 0 1 8 0 V8"/>
    </g>

    <g transform="translate(230,776)" stroke="#9ca3af" stroke-width="2.2">
      <path d="M4 2 H20 V22 L17 20 L14 22 L11 20 L8 22 L4 20 Z"/>
      <path d="M8 8 H16 M8 12 H16 M8 16 H13"/>
    </g>

    <g transform="translate(316,776)" stroke="#9ca3af" stroke-width="2.2">
      <circle cx="14" cy="9" r="5"/>
      <path d="M3 24 a11 11 0 0 1 22 0"/>
    </g>
  </g>
</svg>
