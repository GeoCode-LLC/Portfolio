        <rect x="6" y="6" width="208" height="118" rx="3" fill="#e5e7eb"/>
        <rect x="14" y="14" width="120" height="14" rx="2" fill="#9ca3af"/>
        <rect x="14" y="36" width="180" height="6" rx="1" fill="#cbd5e1"/>
        <rect x="14" y="48" width="160" height="6" rx="1" fill="#cbd5e1"/>
        <rect x="14" y="60" width="140" height="6" rx="1" fill="#cbd5e1"/>
        <!-- chart bars -->
        <rect x="14" y="76" width="20" height="36" fill="#facc15"/>
        <rect x="40" y="84" width="20" height="28" fill="#fbbf24"/>
        <rect x="66" y="68" width="20" height="44" fill="#f59e0b"/>
        <rect x="92" y="80" width="20" height="32" fill="#facc15"/>
        <rect x="118" y="60" width="20" height="52" fill="#d97706"/>
        <rect x="144" y="74" width="20" height="38" fill="#facc15"/>
        <rect x="170" y="56" width="20" height="56" fill="#f59e0b"/>
