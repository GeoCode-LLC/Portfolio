        <rect x="152" y="58" width="34" height="32" rx="6" fill="#0e7490"/>
        <rect x="14" y="94" width="42" height="32" rx="6" fill="#475569"/>
        <rect x="60" y="94" width="42" height="32" rx="6" fill="#475569"/>
        <rect x="106" y="94" width="42" height="32" rx="6" fill="#475569"/>
        <rect x="152" y="94" width="34" height="32" rx="6" fill="#facc15"/>
        <rect x="14" y="130" width="42" height="14" rx="3" fill="#475569"/>
