  <text x="560" y="50" font-size="15" fill="#0f172a">კომპანიის შესახებ</text>
  <path d="M724 44 l5 5 l5 -5" stroke="#0f172a" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
