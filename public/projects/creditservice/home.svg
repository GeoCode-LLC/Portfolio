      <g transform="translate(620,180)">
        <ellipse cx="0" cy="6" rx="36" ry="6" fill="#a16207"/>
        <ellipse rx="36" ry="6" fill="#facc15"/>
        <text y="3" font-size="12" font-weight="800" fill="#0f172a" text-anchor="middle">₾</text>
      </g>
      <g transform="translate(560,200)">
        <ellipse cx="0" cy="6" rx="32" ry="5" fill="#a16207"/>
        <ellipse rx="32" ry="5" fill="#facc15"/>
