        <rect x="-4" y="60" width="88" height="42" rx="3" fill="#2a2a2a"/>
        <ellipse cx="40" cy="60" rx="44" ry="12" fill="#3a3a3a"/>
        <ellipse cx="40" cy="58" rx="40" ry="10" fill="#0f0f0f"/>
