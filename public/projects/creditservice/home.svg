        <path d="M-22 -10 q-4 14 8 18 q14 4 14 -8"/>
        <path d="M-10 -22 q14 -4 18 8 q4 14 -8 14"/>
        <path d="M16 -16 q8 8 0 22"/>
        <path d="M-20 8 q12 14 24 4"/>
