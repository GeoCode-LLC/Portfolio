          <rect x="34" y="36" width="22" height="14" rx="2"/>
          <rect x="60" y="36" width="22" height="14" rx="2"/>
          <rect x="86" y="36" width="22" height="14" rx="2"/>
          <rect x="8" y="54" width="22" height="14" rx="2"/>
          <rect x="34" y="54" width="22" height="14" rx="2"/>
          <rect x="60" y="54" width="22" height="14" rx="2"/>
          <rect x="86" y="54" width="22" height="14" rx="2" fill="#facc15"/>
          <rect x="8" y="72" width="22" height="14" rx="2"/>
          <rect x="34" y="72" width="22" height="14" rx="2"/>
          <rect x="60" y="72" width="22" height="14" rx="2"/>
          <rect x="86" y="72" width="22" height="14" rx="2" fill="#facc15"/>
