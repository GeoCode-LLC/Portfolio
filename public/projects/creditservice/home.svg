    <text x="36" y="280" font-size="22" font-weight="700" fill="#0f172a">სასესხო პროდუქტები</text>
    <text x="36" y="312" font-size="14" fill="#6b7280">იხილეთ ინფორმაცია სალომბარდე და მცირე ბიზნეს</text>
