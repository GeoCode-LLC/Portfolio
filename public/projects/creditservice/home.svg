  <!-- ============ FOOTER ============ -->
  <line x1="60" y1="1020" x2="1540" y2="1020" stroke="#e5e7eb"/>

  <g transform="translate(60,1054)">
    <text font-size="18" font-weight="800" fill="#0f172a">კრედიტსერვისი +</text>
    <text y="32" font-size="12" fill="#6b7280">თანამშრომლობის არსი</text>
    <text y="50" font-size="12" fill="#6b7280">სამართლიანშია</text>

    <text x="320" font-size="13" font-weight="700" fill="#0f172a">კომპანიის შესახებ</text>
    <text x="320" y="32" font-size="12" fill="#6b7280">მენეჯმენტი</text>
    <text x="320" y="50" font-size="12" fill="#6b7280">კომპანიის ისტორია</text>
    <text x="320" y="68" font-size="12" fill="#6b7280">სიახლეები</text>

    <text x="680" font-size="13" font-weight="700" fill="#0f172a">ფინანსური ანგარიშგება</text>
    <text x="680" y="32" font-size="12" fill="#6b7280">წლიური აუდიტი</text>
    <text x="680" y="50" font-size="12" fill="#6b7280">კვარტალური ანგარიში</text>

    <text x="1100" font-size="13" font-weight="700" fill="#0f172a">კონტაქტი</text>
    <text x="1100" y="32" font-size="12" fill="#6b7280">+995 595 120 120</text>
    <text x="1100" y="50" font-size="12" fill="#6b7280">info@creditservice.ge</text>
    <text x="1100" y="68" font-size="12" fill="#6b7280">პეკინის გამზ. 33ა</text>
