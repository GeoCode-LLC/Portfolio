    <path d="M28 18 V26 M24 22 H32" stroke="#0a1220" stroke-width="2.6" stroke-linecap="round"/>
  </g>
  <text x="116" y="36" font-size="20" font-weight="800" fill="#0f172a">კრედიტსერვისი +</text>
  <text x="116" y="58" font-size="11" fill="#6b7280">მიკროსაფინანსო ორგანიზაცია</text>

  <!-- Nav links -->
