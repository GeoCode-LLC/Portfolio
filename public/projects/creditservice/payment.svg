    <text x="28" y="248" font-size="14" font-weight="700" fill="#0f172a">გადახდის შემაჯამებელი</text>

    <g transform="translate(28,272)">
      <text font-size="13" fill="#6b7280">თვის გადახდა</text>
      <text x="464" font-size="13" font-weight="700" fill="#0f172a" text-anchor="end">240.00 ₾</text>
    </g>
    <g transform="translate(28,302)">
      <text font-size="13" fill="#6b7280">პროცენტი (1.9%)</text>
      <text x="464" font-size="13" font-weight="700" fill="#0f172a" text-anchor="end">40.66 ₾</text>
    </g>
    <g transform="translate(28,332)">
      <text font-size="13" fill="#6b7280">საკომისიო</text>
      <text x="464" font-size="13" font-weight="700" fill="#0f172a" text-anchor="end">4.74 ₾</text>
    </g>

    <line x1="28" y1="356" x2="492" y2="356" stroke="#f3f4f6"/>

    <g transform="translate(28,388)">
      <text font-size="15" font-weight="800" fill="#0f172a">სრული თანხა</text>
      <text x="464" font-size="22" font-weight="800" fill="#0f172a" text-anchor="end">285.40 ₾</text>
    </g>

    <line x1="28" y1="420" x2="492" y2="420" stroke="#f3f4f6"/>

    <!-- Next due -->
    <g transform="translate(28,448)">
      <rect width="464" height="72" rx="12" fill="#fffbeb" stroke="#fde68a"/>
      <g transform="translate(18,18)" stroke="#d97706" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <rect x="0" y="2" width="32" height="32" rx="3"/>
        <path d="M0 12 H32 M8 0 V6 M24 0 V6"/>
      </g>
      <text x="64" y="34" font-size="13" font-weight="700" fill="#0f172a">შემდეგი გადახდის თარიღი</text>
      <text x="64" y="54" font-size="12" fill="#92400e">15 ნოემბერი, 2025</text>
      <text x="446" y="42" font-size="22" font-weight="800" fill="#0f172a" text-anchor="end">240₾</text>
    </g>

    <!-- Trust -->
    <g transform="translate(28,544)">
      <text font-size="11" font-weight="700" fill="#9ca3af" letter-spacing="0.5">გადახდის უსაფრთხოება</text>
      <g transform="translate(0,16)">
        <rect width="100" height="40" rx="6" fill="#ffffff" stroke="#e5e7eb"/>
        <text x="50" y="26" font-size="13" font-weight="800" fill="#1d4ed8" text-anchor="middle">VISA</text>
      </g>
      <g transform="translate(112,16)">
        <rect width="100" height="40" rx="6" fill="#ffffff" stroke="#e5e7eb"/>
        <circle cx="42" cy="20" r="10" fill="#ef4444"/>
        <circle cx="58" cy="20" r="10" fill="#fbbf24" opacity="0.9"/>
      </g>
      <g transform="translate(224,16)">
        <rect width="124" height="40" rx="6" fill="#ffffff" stroke="#e5e7eb"/>
        <text x="62" y="26" font-size="12" font-weight="700" fill="#0f172a" text-anchor="middle">Apple / Google Pay</text>
      </g>
      <g transform="translate(360,16)">
        <rect width="132" height="40" rx="6" fill="#0f172a"/>
        <text x="66" y="26" font-size="11" font-weight="800" fill="#facc15" text-anchor="middle">3D Secure</text>
      </g>
    </g>

    <text x="28" y="660" font-size="11" fill="#9ca3af">ტრანზაქცია მუშავდება საქართველოს ბანკის უსაფრთხო პროცესორის მეშვეობით.</text>
  </g>
</svg>
