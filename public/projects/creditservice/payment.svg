      <rect y="14" width="270" height="56" rx="12" fill="#ffffff" stroke="#e5e7eb"/>
      <text x="22" y="50" font-size="18" font-weight="600" fill="#0f172a" font-family="monospace">08 / 27</text>
    </g>
    <g transform="translate(316,400)">
      <text font-size="11" font-weight="700" fill="#9ca3af" letter-spacing="0.5">CVC</text>
      <rect y="14" width="270" height="56" rx="12" fill="#ffffff" stroke="#e5e7eb"/>
      <text x="22" y="50" font-size="18" font-weight="600" fill="#0f172a" font-family="monospace">•••</text>
      <g transform="translate(232,30)" stroke="#9ca3af" stroke-width="1.4" fill="none">
        <circle cx="10" cy="10" r="9"/>
        <text x="10" y="14" font-size="12" font-weight="700" fill="#9ca3af" text-anchor="middle">?</text>
      </g>
    </g>
    <g transform="translate(600,400)">
