  <!-- ============ FORM ============ -->
  <g transform="translate(60,290)">
    <rect width="940" height="720" rx="14" fill="#ffffff" stroke="#e5e7eb"/>

    <text x="32" y="48" font-size="20" font-weight="800" fill="#0f172a">გადახდის დეტალები</text>

