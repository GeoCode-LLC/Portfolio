  </g>
  <text x="800" y="-23" font-size="13" fill="#6b7280" text-anchor="middle">creditservice.ge/payment</text>
  <line x1="0" y1="0" x2="1600" y2="0" stroke="#d1d5db"/>

  <rect width="1600" height="1200" fill="#fafaf7"/>

  <!-- Top nav -->
