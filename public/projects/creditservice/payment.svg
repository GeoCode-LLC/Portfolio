      <rect y="14" width="416" height="48" rx="10" fill="#fafafa" stroke="#e5e7eb"/>
      <text x="16" y="44" font-size="15" font-weight="600" fill="#0f172a">01001012345</text>
      <g transform="translate(388,28)" stroke="#16a34a" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 8 l5 5 l10 -10"/>
      </g>
    </g>
    <g transform="translate(460,80)">
      <text font-size="11" font-weight="700" fill="#9ca3af" letter-spacing="0.5">სესხის ID</text>
      <rect y="14" width="416" height="48" rx="10" fill="#fafafa" stroke="#e5e7eb"/>
      <text x="16" y="44" font-size="15" font-weight="600" fill="#0f172a">CS-2024-04827</text>
      <g transform="translate(388,28)" stroke="#16a34a" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 8 l5 5 l10 -10"/>
      </g>
    </g>

    <!-- Amount -->
    <g transform="translate(32,168)">
      <text font-size="11" font-weight="700" fill="#9ca3af" letter-spacing="0.5">გადასახდელი თანხა</text>
      <rect y="14" width="844" height="64" rx="12" fill="#fffbeb" stroke="#fde68a" stroke-width="1.6"/>
      <text x="22" y="56" font-size="32" font-weight="800" fill="#0f172a">285.40</text>
      <text x="138" y="56" font-size="22" font-weight="700" fill="#6b7280">₾</text>
      <text x="824" y="46" font-size="13" font-weight="700" fill="#16a34a" text-anchor="end">სრულად  ✓</text>
    </g>

    <line x1="32" y1="284" x2="908" y2="284" stroke="#f3f4f6"/>

    <!-- Card number -->
    <g transform="translate(32,308)">
      <text font-size="11" font-weight="700" fill="#9ca3af" letter-spacing="0.5">ბარათის ნომერი</text>
      <rect y="14" width="844" height="56" rx="12" fill="#ffffff" stroke="#0f172a" stroke-width="1.8"/>
      <text x="22" y="50" font-size="20" font-weight="700" fill="#0f172a" font-family="monospace">5392  ████  ████  4218</text>
      <g transform="translate(770,28)">
        <rect width="40" height="26" rx="3" fill="#ffffff" stroke="#e5e7eb"/>
        <circle cx="14" cy="13" r="8" fill="#ef4444"/>
        <circle cx="26" cy="13" r="8" fill="#fbbf24" opacity="0.85"/>
      </g>
    </g>

