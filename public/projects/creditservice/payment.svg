  <!-- Title -->
  <text x="60" y="148" font-size="36" font-weight="800" fill="#0f172a">სესხის ონლაინ გადახდა</text>
  <text x="60" y="180" font-size="15" fill="#6b7280">გადაიხადეთ უსაფრთხოდ – ტრანზაქცია დაცულია 3D Secure-ით.</text>

  <!-- Stepper -->
  <g transform="translate(60,212)">
    <circle cx="14" cy="14" r="14" fill="#facc15"/>
    <text x="14" y="20" font-size="14" font-weight="800" fill="#0f172a" text-anchor="middle">1</text>
    <text x="36" y="20" font-size="13" font-weight="700" fill="#0f172a">სესხის დადასტურება</text>

    <path d="M200 14 H260" stroke="#e5e7eb" stroke-width="2"/>

    <circle cx="274" cy="14" r="14" fill="#0f172a"/>
    <text x="274" y="20" font-size="14" font-weight="800" fill="#facc15" text-anchor="middle">2</text>
    <text x="296" y="20" font-size="13" font-weight="700" fill="#0f172a">ბარათის დეტალები</text>

    <path d="M450 14 H510" stroke="#e5e7eb" stroke-width="2"/>

    <circle cx="524" cy="14" r="14" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.6"/>
