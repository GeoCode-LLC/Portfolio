      <text x="62" y="52" font-size="12" fill="#15803d" fill-opacity="0.85">გადარიცხვა გადის ბანკის უსაფრთხო გვერდით — დაგვინდობდით თქვენი ბარათის ერთჯერად კოდს.</text>
