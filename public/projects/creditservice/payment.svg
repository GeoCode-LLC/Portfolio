      <text x="24" y="62" font-size="18" font-weight="800" fill="#ffffff" font-family="monospace">CS-2024-04827</text>

      <text x="24" y="106" font-size="11" font-weight="600" fill="#9ca3af" letter-spacing="0.5">დარჩენილი ბალანსი</text>
      <text x="24" y="142" font-size="32" font-weight="800" fill="#ffffff">2,140.60 ₾</text>

