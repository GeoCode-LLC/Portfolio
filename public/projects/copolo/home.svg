<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" font-family="-apple-system, system-ui, sans-serif">
  <rect width="390" height="844" fill="#ffffff"/>

  <!-- Status bar -->
  <text x="32" y="38" font-size="15" font-weight="600" fill="#000">9:41</text>

  <!-- Hero banner -->
  <path d="M0,60 H390 V230 Q195,290 0,230 Z" fill="#1aa8a8"/>
  <text x="28" y="140" font-size="26" font-weight="700" fill="#ffffff">Hey Davit! Look</text>
  <text x="28" y="172" font-size="26" font-weight="700" fill="#ffffff">what's new for you!</text>

  <!-- Promo card -->
  <rect x="20" y="270" width="350" height="150" rx="20" fill="#ffe4b5"/>
  <text x="40" y="306" font-size="18" font-weight="700" fill="#e07a1a">Be a Team Captain!</text>
  <text x="40" y="332" font-size="13" fill="#e07a1a">Make team travel a</text>
  <text x="40" y="350" font-size="13" fill="#e07a1a">fun part of the game.</text>
  <rect x="40" y="368" width="125" height="36" rx="18" fill="#1aa8a8"/>
  <text x="103" y="392" font-size="13" font-weight="600" fill="#ffffff" text-anchor="middle">Get Started</text>
  <g transform="translate(230,285)">
    <circle cx="60" cy="60" r="60" fill="#cfdde6"/>
    <circle cx="40" cy="40" r="14" fill="#fff"/>
    <circle cx="78" cy="48" r="12" fill="#fff"/>
  </g>

  <!-- Travel by theme -->
  <text x="20" y="455" font-size="20" font-weight="700" fill="#0e1b2c">Travel By Theme</text>

  <g transform="translate(20,470)">
    <circle cx="36" cy="36" r="36" fill="#7c6f5a"/>
    <text x="36" y="92" font-size="11" font-weight="600" fill="#0e1b2c" text-anchor="middle">Bachelor</text>
    <text x="36" y="105" font-size="11" font-weight="600" fill="#0e1b2c" text-anchor="middle">Party</text>
  </g>
  <g transform="translate(105,470)">
    <circle cx="36" cy="36" r="36" fill="#dba98e"/>
    <text x="36" y="92" font-size="11" font-weight="600" fill="#0e1b2c" text-anchor="middle">Bachelorette</text>
    <text x="36" y="105" font-size="11" font-weight="600" fill="#0e1b2c" text-anchor="middle">Party</text>
  </g>
  <g transform="translate(190,470)">
    <circle cx="36" cy="36" r="36" fill="#3b6e57"/>
    <text x="36" y="92" font-size="11" font-weight="600" fill="#0e1b2c" text-anchor="middle">Sports Team</text>
    <text x="36" y="105" font-size="11" font-weight="600" fill="#0e1b2c" text-anchor="middle">Travel</text>
  </g>
  <g transform="translate(275,470)">
    <circle cx="36" cy="36" r="36" fill="#a9c4d2"/>
    <text x="36" y="92" font-size="11" font-weight="600" fill="#0e1b2c" text-anchor="middle">Destination</text>
    <text x="36" y="105" font-size="11" font-weight="600" fill="#0e1b2c" text-anchor="middle">Wedding</text>
  </g>

  <!-- Search prompt -->
  <text x="20" y="615" font-size="15" font-weight="700" fill="#e07a1a">Already know where you want to go?</text>
  <g transform="translate(20,628)">
    <circle cx="14" cy="14" r="6" fill="none" stroke="#9aa3ad" stroke-width="2"/>
    <line x1="19" y1="19" x2="25" y2="25" stroke="#9aa3ad" stroke-width="2" stroke-linecap="round"/>
    <text x="34" y="20" font-size="12" fill="#9aa3ad">Search Stays, Flights, Activities &amp; Cars</text>
  </g>

  <!-- Four tiles -->
  <g transform="translate(20,665)">
    <!-- Stays -->
    <rect x="0" y="0" width="80" height="80" rx="14" fill="#1aa8a8"/>
    <g transform="translate(22,18)" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect x="0" y="14" width="36" height="12" rx="2"/>
      <path d="M2 14 v-6 a4 4 0 0 1 4 -4 h24 a4 4 0 0 1 4 4 v6"/>
      <path d="M2 26 v6 M34 26 v6"/>
    </g>
    <text x="40" y="68" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">Stays</text>

    <!-- Flights -->
    <rect x="92" y="0" width="80" height="80" rx="14" fill="#1aa8a8"/>
    <g transform="translate(112,18)" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M2 22 l36 -10 l-4 8 l-22 6 l-2 6 l-4 0 l2 -8 l-8 0 l-4 4 l-2 -2 z"/>
    </g>
    <text x="132" y="68" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">Flights</text>

    <!-- Activities (carousel) -->
    <rect x="184" y="0" width="80" height="80" rx="14" fill="#1aa8a8"/>
    <g transform="translate(204,16)" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M2 24 a18 6 0 0 1 36 0"/>
      <path d="M20 6 v18"/>
      <path d="M14 14 l12 0"/>
      <path d="M2 24 v6"/>
      <path d="M38 24 v6"/>
      <circle cx="20" cy="4" r="2"/>
    </g>
    <text x="224" y="68" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">Activities</text>

    <!-- Cars -->
    <rect x="276" y="0" width="80" height="80" rx="14" fill="#1aa8a8"/>
    <g transform="translate(294,24)" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M2 18 l4 -10 a3 3 0 0 1 3 -2 h26 a3 3 0 0 1 3 2 l4 10 v8 h-40 z"/>
      <circle cx="10" cy="28" r="3" fill="#fff"/>
      <circle cx="34" cy="28" r="3" fill="#fff"/>
    </g>
    <text x="316" y="68" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">Cars</text>
  </g>

  <!-- Bottom tab bar -->
  <rect x="0" y="755" width="390" height="89" fill="#ffffff"/>
  <line x1="0" y1="755" x2="390" y2="755" stroke="#e5e7eb"/>

  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Home (active, teal) -->
    <g transform="translate(35,770)" stroke="#1aa8a8" stroke-width="2.4">
      <path d="M2 16 L16 3 L30 16 V28 H2 Z"/>
      <path d="M11 28 V20 H21 V28"/>
    </g>
    <text x="51" y="822" font-size="13" font-weight="700" fill="#1aa8a8" text-anchor="middle">Home</text>

    <!-- Themes (broken circle) -->
    <g transform="translate(98,770)" stroke="#9aa3ad" stroke-width="2.4">
      <path d="M28 6 A14 14 0 1 0 30 18"/>
      <path d="M30 6 A6 6 0 0 0 22 12"/>
    </g>
    <text x="114" y="822" font-size="13" font-weight="700" fill="#9aa3ad" text-anchor="middle">Themes</text>

    <!-- Circles (5 dots cluster) -->
    <g transform="translate(165,772)" fill="#9aa3ad">
      <circle cx="14" cy="6" r="3"/>
      <circle cx="6" cy="14" r="3"/>
      <circle cx="22" cy="14" r="3"/>
      <circle cx="10" cy="22" r="3"/>
      <circle cx="18" cy="22" r="3"/>
    </g>
    <text x="179" y="822" font-size="13" font-weight="700" fill="#9aa3ad" text-anchor="middle">Circles</text>

    <!-- Trips (ticket with + corner) -->
    <g transform="translate(228,772)" stroke="#9aa3ad" stroke-width="2.4">
      <path d="M3 6 H22 L29 13 V26 A2 2 0 0 1 27 28 H3 A2 2 0 0 1 1 26 V8 A2 2 0 0 1 3 6 Z"/>
      <path d="M22 6 V13 H29"/>
      <path d="M9 18 H17 M13 14 V22"/>
    </g>
    <text x="243" y="822" font-size="13" font-weight="700" fill="#9aa3ad" text-anchor="middle">Trips</text>

    <!-- Alerts (bell) -->
    <g transform="translate(290,770)" stroke="#9aa3ad" stroke-width="2.4">
      <path d="M5 22 V14 A10 10 0 0 1 25 14 V22 L27 25 H3 Z"/>
      <path d="M12 25 a3 3 0 0 0 6 0"/>
    </g>
    <text x="305" y="822" font-size="13" font-weight="700" fill="#9aa3ad" text-anchor="middle">Alerts</text>

    <!-- Menu (hamburger) -->
    <g transform="translate(353,775)" stroke="#9aa3ad" stroke-width="2.4">
      <path d="M2 3 H22 M2 13 H22 M2 23 H22"/>
    </g>
    <text x="365" y="822" font-size="13" font-weight="700" fill="#9aa3ad" text-anchor="middle">Menu</text>
  </g>
</svg>
