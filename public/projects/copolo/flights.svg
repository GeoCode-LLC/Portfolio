<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" font-family="-apple-system, system-ui, sans-serif">
  <rect width="390" height="844" fill="#ffffff"/>

  <text x="32" y="38" font-size="15" font-weight="600" fill="#000">9:41</text>

  <!-- Search summary -->
  <rect x="20" y="80" width="350" height="74" rx="14" fill="#ffffff" stroke="#cfd6dc"/>
  <path d="M40 117 l-8 -8 8 -8" stroke="#0e1b2c" stroke-width="2" fill="none" stroke-linecap="round"/>
  <text x="60" y="110" font-size="16" font-weight="700" fill="#0e1b2c">TBS - LAX, LAX - TBS, IST - TBS</text>
  <text x="60" y="132" font-size="13" fill="#6b7480">Jan 09 - Feb 05  •  1 traveler  •  Economy</text>

  <!-- Steps -->
  <g transform="translate(20,180)">
    <text x="0" y="0" font-size="13" font-weight="700" fill="#e07a1a">Flight to LAX</text>
    <path d="M85 -4 l16 0" stroke="#1aa8a8" stroke-width="1.8" stroke-linecap="round"/>
    <polyline points="98,-9 105,-4 98,1" fill="none" stroke="#1aa8a8" stroke-width="1.8"/>
    <text x="115" y="0" font-size="13" fill="#9aa3ad">Flight to TBS</text>
    <path d="M192 -4 l16 0" stroke="#1aa8a8" stroke-width="1.8" stroke-linecap="round"/>
    <polyline points="204,-9 211,-4 204,1" fill="none" stroke="#1aa8a8" stroke-width="1.8"/>
    <text x="222" y="0" font-size="13" fill="#9aa3ad">Flight to TBS</text>
  </g>

  <!-- Filters -->
  <g transform="translate(20,210)">
    <rect width="155" height="40" rx="20" fill="none" stroke="#1aa8a8" stroke-width="1.4"/>
    <text x="20" y="25" font-size="13" font-weight="600" fill="#1aa8a8">↕ Sort by : Best</text>
    <rect x="170" width="80" height="40" rx="20" fill="none" stroke="#1aa8a8" stroke-width="1.4"/>
    <text x="210" y="25" font-size="13" font-weight="600" fill="#1aa8a8" text-anchor="middle">Stops</text>
    <rect x="260" width="100" height="40" rx="20" fill="none" stroke="#1aa8a8" stroke-width="1.4"/>
    <text x="310" y="25" font-size="13" font-weight="600" fill="#1aa8a8" text-anchor="middle">Duration</text>
  </g>

  <!-- Results banner -->
  <rect x="0" y="270" width="390" height="44" fill="#eef1f4"/>
  <text x="195" y="298" font-size="15" font-weight="700" fill="#0e1b2c" text-anchor="middle">8 flights found</text>

  <!-- Card 1 -->
  <g transform="translate(20,330)">
    <rect width="350" height="190" rx="14" fill="#ffffff" stroke="#e5e7eb"/>
    <rect x="20" y="20" width="80" height="26" rx="13" fill="#1da661"/>
    <text x="60" y="38" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">Cheapest</text>
    <circle cx="32" cy="68" r="10" fill="#fbe9e7"/>
    <text x="32" y="72" font-size="8" font-weight="700" fill="#c0392b" text-anchor="middle">E</text>
    <text x="55" y="68" font-size="14" font-weight="700" fill="#0e1b2c">Emirates</text>
    <text x="55" y="88" font-size="12" fill="#6b7480">1d 7h 50m</text>

    <text x="20" y="130" font-size="20" font-weight="700" fill="#0e1b2c">04:55 PM</text>
    <text x="20" y="150" font-size="12" fill="#6b7480">TBS</text>
    <line x1="125" y1="124" x2="240" y2="124" stroke="#1aa8a8" stroke-width="1.6"/>
    <circle cx="180" cy="124" r="4" fill="#1aa8a8"/>
    <polyline points="232,118 240,124 232,130" fill="none" stroke="#1aa8a8" stroke-width="1.6"/>
    <text x="180" y="140" font-size="11" fill="#e07a1a" text-anchor="middle">1 stop</text>
    <text x="250" y="130" font-size="20" font-weight="700" fill="#0e1b2c">12:45 PM</text>
    <text x="250" y="150" font-size="12" fill="#6b7480">LAX</text>
    <text x="335" y="115" font-size="10" font-weight="700" fill="#0e1b2c">+1</text>

    <text x="20" y="178" font-size="12" font-weight="600" fill="#d23434">9 seat(s) left</text>
  </g>

  <!-- Card 2 -->
  <g transform="translate(20,540)">
    <rect width="350" height="190" rx="14" fill="#ffffff" stroke="#e5e7eb"/>
    <rect x="20" y="20" width="68" height="26" rx="13" fill="#1aa8a8"/>
    <text x="54" y="38" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">Fastest</text>
    <rect x="22" y="58" width="26" height="22" rx="2" fill="#0e3a82"/>
    <text x="35" y="74" font-size="9" font-weight="700" fill="#fff" text-anchor="middle">LOT</text>
    <text x="60" y="68" font-size="14" font-weight="700" fill="#0e1b2c">LOT Polish Airlines</text>
    <text x="60" y="88" font-size="12" fill="#6b7480">19h 35m</text>

    <text x="20" y="130" font-size="20" font-weight="700" fill="#0e1b2c">06:45 AM</text>
    <text x="20" y="150" font-size="12" fill="#6b7480">TBS</text>
    <line x1="125" y1="124" x2="240" y2="124" stroke="#1aa8a8" stroke-width="1.6"/>
    <circle cx="180" cy="124" r="4" fill="#1aa8a8"/>
    <polyline points="232,118 240,124 232,130" fill="none" stroke="#1aa8a8" stroke-width="1.6"/>
    <text x="180" y="140" font-size="11" fill="#e07a1a" text-anchor="middle">1 stop</text>
    <text x="250" y="130" font-size="20" font-weight="700" fill="#0e1b2c">02:20 PM</text>
    <text x="250" y="150" font-size="12" fill="#6b7480">LAX</text>

    <text x="20" y="178" font-size="12" font-weight="600" fill="#d23434">9 seat(s) left</text>
  </g>

  <!-- Card 3 peek -->
  <g transform="translate(20,750)">
    <rect width="350" height="80" rx="14" fill="#ffffff" stroke="#e5e7eb"/>
    <rect x="22" y="18" width="40" height="28" rx="4" fill="#f4d03f"/>
    <circle cx="42" cy="32" r="9" fill="#0a2240"/>
    <text x="74" y="34" font-size="14" font-weight="700" fill="#0e1b2c">Lufthansa</text>
    <text x="74" y="52" font-size="12" fill="#6b7480">21h 5m</text>
  </g>
</svg>
