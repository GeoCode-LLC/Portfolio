<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" font-family="-apple-system, system-ui, sans-serif">
  <rect width="390" height="844" fill="#ffffff"/>

  <text x="32" y="38" font-size="15" font-weight="600" fill="#000">9:41</text>

  <!-- Header -->
  <path d="M32 100 l-10 -10 10 -10" stroke="#0e1b2c" stroke-width="2.4" fill="none" stroke-linecap="round"/>
  <text x="195" y="98" font-size="20" font-weight="700" fill="#0e1b2c" text-anchor="middle">Kia Soul</text>
  <circle cx="354" cy="92" r="18" fill="#eef1f4"/>
  <path d="M354 88 q-4 -4 -7 0 q-3 4 7 11 q10 -7 7 -11 q-3 -4 -7 0z" fill="none" stroke="#0e1b2c" stroke-width="1.8"/>

  <!-- Car illustration -->
  <g transform="translate(40,150)">
    <ellipse cx="155" cy="170" rx="150" ry="10" fill="#eaeef1"/>
    <!-- body -->
    <path d="M20 130 Q35 80 90 70 L220 70 Q275 80 290 130 L290 160 L20 160 Z" fill="#6e7780"/>
    <!-- windows -->
    <path d="M70 80 Q90 76 130 76 L130 122 L60 122 Q58 96 70 80z" fill="#3a4148"/>
    <path d="M140 76 L210 76 Q230 80 240 122 L140 122 Z" fill="#3a4148"/>
    <!-- door line -->
    <line x1="155" y1="80" x2="155" y2="155" stroke="#525a62" stroke-width="1.2"/>
    <!-- lights -->
    <rect x="25" y="118" width="25" height="10" rx="3" fill="#f1e6c8"/>
    <rect x="260" y="118" width="25" height="10" rx="3" fill="#f1e6c8"/>
    <!-- grille -->
    <rect x="225" y="135" width="55" height="14" rx="3" fill="#2a2f35"/>
    <!-- wheels -->
    <circle cx="80" cy="160" r="26" fill="#1a1c20"/>
    <circle cx="80" cy="160" r="14" fill="#3a4148"/>
    <circle cx="80" cy="160" r="5" fill="#1a1c20"/>
    <circle cx="240" cy="160" r="26" fill="#1a1c20"/>
    <circle cx="240" cy="160" r="14" fill="#3a4148"/>
    <circle cx="240" cy="160" r="5" fill="#1a1c20"/>
  </g>

  <!-- Compact chip -->
  <rect x="20" y="370" width="100" height="34" rx="17" fill="#2b78c7"/>
  <text x="70" y="392" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">Compact</text>

  <!-- Title -->
  <text x="20" y="445" font-size="28" font-weight="700" fill="#0e1b2c">Kia Soul</text>
  <text x="142" y="445" font-size="16" fill="#6b7480">or similar</text>

  <!-- AVIS -->
  <text x="20" y="495" font-size="28" font-weight="900" fill="#d31919" letter-spacing="2">AVIS</text>
  <text x="105" y="487" font-size="10" font-weight="700" fill="#d31919">®</text>

  <!-- Specs row -->
  <g transform="translate(20,520)" fill="#0e1b2c">
    <g>
      <rect width="22" height="18" rx="3" fill="none" stroke="#0e1b2c" stroke-width="1.6"/>
      <text x="0" y="40" font-size="13" font-weight="600">4</text>
      <text x="-4" y="56" font-size="9" fill="#6b7480">Doors</text>
    </g>
    <g transform="translate(60,0)">
      <path d="M0 0 h22 v6 a6 6 0 0 1 -6 6 h-10 a6 6 0 0 1 -6 -6z M2 -6 h18 v6 h-18z" fill="none" stroke="#0e1b2c" stroke-width="1.6"/>
      <text x="0" y="40" font-size="13" font-weight="600">5</text>
    </g>
    <g transform="translate(120,0)">
      <path d="M4 0 v18 M16 0 v18 M4 9 h12" stroke="#0e1b2c" stroke-width="1.6" fill="none"/>
      <text x="0" y="40" font-size="13" font-weight="600">Auto</text>
    </g>
    <g transform="translate(190,0)">
      <path d="M11 0 v18 M2 9 h18 M5 3 l12 12 M5 15 l12 -12" stroke="#0e1b2c" stroke-width="1.4" fill="none"/>
      <text x="-2" y="40" font-size="13" font-weight="600">A/C</text>
    </g>
  </g>

  <line x1="20" y1="600" x2="370" y2="600" stroke="#e5e7eb"/>

  <!-- Basic Rate -->
  <text x="20" y="640" font-size="22" font-weight="700" fill="#0e1b2c">Basic Rate</text>

  <g transform="translate(20,665)" font-size="14" fill="#0e1b2c">
    <circle cx="14" cy="14" r="12" fill="#e8801e"/>
    <path d="M8 14 l4 4 l8 -8" stroke="#fff" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="40" y="20">Liability Insurance</text>

    <g transform="translate(0,40)">
      <circle cx="14" cy="14" r="12" fill="#e8801e"/>
      <path d="M8 14 l4 4 l8 -8" stroke="#fff" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="40" y="20">Fire Insurance</text>
    </g>
    <g transform="translate(0,80)" opacity="0.4">
      <circle cx="14" cy="14" r="12" fill="#9aa3ad"/>
      <path d="M9 9 l10 10 M19 9 l-10 10" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/>
      <text x="40" y="20" fill="#9aa3ad">Collision Damage Waiver (CDW)</text>
    </g>
    <g transform="translate(0,120)" opacity="0.4">
      <circle cx="14" cy="14" r="12" fill="#9aa3ad"/>
      <path d="M9 9 l10 10 M19 9 l-10 10" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/>
      <text x="40" y="20" fill="#9aa3ad">Theft Protection (TP)</text>
    </g>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="800" width="390" height="44" fill="#fff"/>
  <line x1="0" y1="800" x2="390" y2="800" stroke="#e5e7eb"/>
  <text x="20" y="828" font-size="20" font-weight="800" fill="#0a3a82">$588.12</text>
  <text x="20" y="844" font-size="11" fill="#6b7480">Total</text>
  <rect x="230" y="808" width="140" height="44" rx="22" fill="#1aa8a8"/>
  <text x="300" y="836" font-size="15" font-weight="700" fill="#fff" text-anchor="middle">Continue</text>
</svg>
