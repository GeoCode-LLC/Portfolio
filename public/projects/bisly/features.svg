<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -56 1600 1256" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif">
  <!-- Browser chrome -->
  <rect x="0" y="-56" width="1600" height="56" fill="#e5e7eb"/>
  <circle cx="28" cy="-28" r="8" fill="#ef4444"/>
  <circle cx="54" cy="-28" r="8" fill="#fbbf24"/>
  <circle cx="80" cy="-28" r="8" fill="#22c55e"/>
  <rect x="480" y="-42" width="640" height="28" rx="14" fill="#ffffff"/>
  <g transform="translate(508,-32)" stroke="#6b7280" stroke-width="1.4" fill="none">
    <path d="M2 6 V4 a3 3 0 0 1 6 0 V6 M0 6 H10 V12 H0 Z"/>
  </g>
  <text x="800" y="-23" font-size="13" fill="#6b7280" text-anchor="middle">bisly.com / platform</text>
  <line x1="0" y1="0" x2="1600" y2="0" stroke="#d1d5db"/>

  <!-- Page bg -->
  <rect width="1600" height="1200" fill="#ffffff"/>

  <!-- ============ TOP NAV ============ -->
  <rect x="0" y="0" width="1600" height="80" fill="#ffffff"/>
  <line x1="0" y1="80" x2="1600" y2="80" stroke="#eef2f0"/>
  <g transform="translate(60,22)">
    <rect width="40" height="40" rx="10" fill="#5dd0a6"/>
    <path d="M14 10 H24 a6 6 0 0 1 0 12 H14 Z M14 18 H26 a6 6 0 0 1 0 12 H14 Z" fill="#ffffff"/>
  </g>
  <text x="116" y="42" font-size="22" font-weight="800" fill="#0f172a">Bisly</text>
  <text x="116" y="62" font-size="10" font-weight="700" fill="#9ca3af" letter-spacing="2">SMART BUILDINGS</text>

  <text x="640" y="50" font-size="15" font-weight="600" fill="#0f172a">Solutions</text>
  <text x="760" y="50" font-size="15" font-weight="700" fill="#0f8a5a">Platform</text>
  <text x="870" y="50" font-size="15" font-weight="600" fill="#0f172a">Pricing</text>
  <text x="970" y="50" font-size="15" font-weight="600" fill="#0f172a">About</text>
  <text x="1060" y="50" font-size="15" font-weight="600" fill="#0f172a">Resources</text>
  <text x="1380" y="50" font-size="14" font-weight="600" fill="#0f172a">Sign in</text>
  <rect x="1440" y="22" width="100" height="40" rx="20" fill="#0f172a"/>
  <text x="1490" y="48" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">Book demo</text>

  <!-- ============ LEFT: HEADING ============ -->
  <text x="120" y="220" font-size="14" font-weight="700" fill="#0f8a5a" letter-spacing="3">— PLATFORM</text>

  <text x="120" y="320" font-size="64" font-weight="800" fill="#0f172a">Build smarter,</text>
  <text x="120" y="396" font-size="64" font-weight="800" fill="#0f172a">manage easier</text>
  <text x="120" y="472" font-size="64" font-weight="800" fill="#0f172a">with <tspan fill="#0f8a5a">Bisly</tspan>.</text>

  <text x="120" y="544" font-size="18" fill="#475569">A single operating layer for buildings — HVAC, lighting,</text>
  <text x="120" y="572" font-size="18" fill="#475569">access, energy and metering in one connected system.</text>

  <rect x="120" y="612" width="180" height="56" rx="28" fill="#0f172a"/>
  <text x="210" y="647" font-size="15" font-weight="700" fill="#ffffff" text-anchor="middle">Talk to sales</text>

  <!-- Small visual cards (down-left) -->
  <g transform="translate(120,720)">
    <rect width="240" height="100" rx="14" fill="#f0fdf4"/>
    <text x="20" y="36" font-size="11" font-weight="700" fill="#0f8a5a" letter-spacing="2">PORTFOLIOS</text>
    <text x="20" y="68" font-size="22" font-weight="800" fill="#0f172a">42</text>
    <text x="56" y="68" font-size="13" font-weight="600" fill="#475569">cities live</text>
    <text x="20" y="88" font-size="11" fill="#64748b">Across 9 European markets</text>
  </g>
  <g transform="translate(380,720)">
    <rect width="240" height="100" rx="14" fill="#eff6ff"/>
    <text x="20" y="36" font-size="11" font-weight="700" fill="#2563eb" letter-spacing="2">SENSORS</text>
    <text x="20" y="68" font-size="22" font-weight="800" fill="#0f172a">120k+</text>
    <text x="20" y="88" font-size="11" fill="#64748b">Devices monitored every minute</text>
  </g>

  <!-- ============ RIGHT: FEATURE ACCORDION ============ -->
  <g transform="translate(820,200)">
    <rect width="660" height="780" rx="20" fill="#fafaf7"/>

    <!-- HVAC (expanded) -->
    <rect x="40" y="40" width="580" height="120" rx="14" fill="#ffffff" stroke="#e5e7eb"/>
    <g transform="translate(72,76)" stroke="#5dd0a6" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M0 26 L20 8 L40 26 V44 H0 Z"/>
      <path d="M14 44 V32 H28 V44"/>
    </g>
    <text x="148" y="86" font-size="22" font-weight="800" fill="#0f172a">HVAC</text>
    <text x="148" y="112" font-size="13" fill="#64748b">Smart climate control across every zone with</text>
    <text x="148" y="130" font-size="13" fill="#64748b">live CO₂, humidity and temperature feedback.</text>
    <!-- chevron up -->
    <g transform="translate(560,84)" stroke="#0f172a" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M0 16 L10 4 L20 16"/>
    </g>

    <!-- Lighting -->
    <rect x="40" y="180" width="580" height="78" rx="14" fill="#ffffff" stroke="#e5e7eb"/>
    <g transform="translate(72,206)" stroke="#5dd0a6" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M0 22 a18 18 0 1 1 28 0 l-2 14 h-24 z"/>
      <path d="M4 42 h20 M8 50 h12"/>
    </g>
    <text x="148" y="226" font-size="20" font-weight="800" fill="#0f172a">Lighting</text>
    <g transform="translate(560,210)" stroke="#475569" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M0 4 L10 16 L20 4"/>
    </g>

    <!-- Access control -->
    <rect x="40" y="278" width="580" height="78" rx="14" fill="#ffffff" stroke="#e5e7eb"/>
    <g transform="translate(72,304)" stroke="#5dd0a6" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect x="0" y="10" width="36" height="26" rx="5"/>
      <path d="M6 10 v-4 a12 12 0 0 1 24 0 v4"/>
      <circle cx="18" cy="24" r="3" fill="#5dd0a6"/>
    </g>
    <text x="148" y="324" font-size="20" font-weight="800" fill="#0f172a">Access control</text>
    <g transform="translate(560,308)" stroke="#475569" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M0 4 L10 16 L20 4"/>
    </g>

    <!-- Consumption data -->
    <rect x="40" y="376" width="580" height="78" rx="14" fill="#ffffff" stroke="#e5e7eb"/>
    <g transform="translate(72,400)" stroke="#5dd0a6" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M0 40 L0 8 H40 V40 Z"/>
      <path d="M6 34 V22 M16 34 V14 M26 34 V26 M36 34 V10"/>
    </g>
    <text x="148" y="422" font-size="20" font-weight="800" fill="#0f172a">Consumption data</text>
    <g transform="translate(560,406)" stroke="#475569" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M0 4 L10 16 L20 4"/>
    </g>

    <!-- Remote readings -->
    <rect x="40" y="474" width="580" height="78" rx="14" fill="#ffffff" stroke="#e5e7eb"/>
    <g transform="translate(72,500)" stroke="#5dd0a6" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect x="0" y="0" width="34" height="40" rx="5"/>
      <path d="M6 10 h22 M6 20 h22 M6 30 h12"/>
      <path d="M40 12 q6 4 0 10"/>
      <path d="M46 6 q10 12 0 22"/>
    </g>
    <text x="148" y="520" font-size="20" font-weight="800" fill="#0f172a">Remote readings</text>
    <g transform="translate(560,504)" stroke="#475569" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M0 4 L10 16 L20 4"/>
    </g>

    <!-- Alerts & analytics -->
    <rect x="40" y="572" width="580" height="78" rx="14" fill="#ffffff" stroke="#e5e7eb"/>
    <g transform="translate(72,598)" stroke="#5dd0a6" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M2 30 L14 18 L24 26 L40 8"/>
      <circle cx="14" cy="18" r="2.5" fill="#5dd0a6"/>
      <circle cx="40" cy="8" r="2.5" fill="#5dd0a6"/>
    </g>
    <text x="148" y="618" font-size="20" font-weight="800" fill="#0f172a">Alerts &amp; analytics</text>
    <g transform="translate(560,602)" stroke="#475569" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M0 4 L10 16 L20 4"/>
    </g>

    <!-- Integrations -->
    <rect x="40" y="670" width="580" height="78" rx="14" fill="#ffffff" stroke="#e5e7eb"/>
    <g transform="translate(72,696)" stroke="#5dd0a6" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="10" cy="10" r="8"/>
      <circle cx="34" cy="10" r="8"/>
      <circle cx="22" cy="30" r="8"/>
      <path d="M14 14 L26 28 M30 14 L26 28"/>
    </g>
    <text x="148" y="716" font-size="20" font-weight="800" fill="#0f172a">Integrations &amp; APIs</text>
    <g transform="translate(560,700)" stroke="#475569" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M0 4 L10 16 L20 4"/>
    </g>
  </g>
</svg>
